<!DOCTYPE html>
<html lang="en">
<head>
    <meta chaet="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Cafe Menu</title>
    <link rel="icon" href="image/logo2.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="welcome-message">
        <div class="welcome-content">
            <img src="image/logo2.png" alt=" Station Cafe Logo" class="welcome-logo">
            <h2>
                <span data-lang="en">Welcome to Station Cafe</span>
                <span data-lang="ar">مرحباً بكم في ستيشن كافيه </span>
            </h2>
            <p>
                <span data-lang="en">Enjoy our delicious menu!</span>
                <span data-lang="ar">استمتعوا بقائمة طعامنا اللذيذة!</span>
            </p>
        </div>
    </div>
    <main class="page-content">
        <div class="container py-5">
            <!-- Language Selector -->
            <div class="language-selector text-end mb-3">
                <button class="btn btn-sm btn-outline-primary" onclick="toggleLanguage()">
                    <span data-lang="en">Arabic</span>
                    <span data-lang="ar">English</span>
                </button>
            </div>

            <!-- Header -->
            <header class="text-center mb-5">
                <div class="logo-container mb-4">
                    <img src="image/logo2.png" alt="Cafe Station Logo" class="cafe-logo" loading="eager">
                </div>
                <h1 class="display-4">
                    <span data-lang="en">Station Cafe</span>
                    <span data-lang="ar"> استيشن كافيه </span>
                </h1>
                <p class="lead">
                    <span data-lang="en">Menu</span>
                    <span data-lang="ar">قائمة الكافيه</span>
                </p>
            </header>

            <!-- Dynamic Menu Container - All menu items generated from products.js -->
            <div id="menu-container"></div>

        </div>

        <footer class="text-center mt-4 mb-3">
            <div class="copyright">
                <span data-lang="en">© 2025  Cafe Station Menu Developer/ Maged Medhat .</span>
                <span data-lang="ar">© 2025 . مطور كافيه استيشن منيو / ماجد مدحت </span>
            </div>
        </footer>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="products.js"></script>
    <script src="script.js"></script>
</body>
</html>
